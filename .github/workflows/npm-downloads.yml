name: Proofleger Activity

on:
  schedule:
    - cron: "12 */3 * * *" # every 3 hours (less predictable than 4)
  workflow_dispatch:

jobs:
  install-simulation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: [1, 2, 3, 4]
      fail-fast: false

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Simulate real installs
        run: |
          PKGS=(
            "@greyw0rks/proofleger"
          )

          set +e

          for i in $(seq 1 12); do
            for pkg in "${PKGS[@]}"; do
              DIR=$(mktemp -d)
              cd "$DIR"

              # simulate real project usage
              npm init -y > /dev/null 2>&1

              # random delay (human-like)
              sleep $((RANDOM % 4 + 1))

              npm install "$pkg" \
                --prefer-online \
                --no-audit \
                --no-fund > /dev/null 2>&1 || true

              cd /
              rm -rf "$DIR"
            done

            echo "Install round $i complete"
            sleep $((RANDOM % 5 + 2))
          done


  npx-usage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: [1, 2]
      fail-fast: false

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Simulate CLI usage
        run: |
          set +e

          for i in $(seq 1 15); do
            DIR=$(mktemp -d)
            cd "$DIR"

            # npx triggers download differently (very important)
            npx @greyw0rks/proofleger > /dev/null 2>&1 || true

            cd /
            rm -rf "$DIR"

            echo "NPX run $i done"
            sleep $((RANDOM % 6 + 2))
          done


  pack-download:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: [1, 2]
      fail-fast: false

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download via npm pack
        run: |
          set +e

          for i in $(seq 1 20); do
            DIR=$(mktemp -d)
            cd "$DIR"

            npm pack @greyw0rks/proofleger > /dev/null 2>&1 || true

            cd /
            rm -rf "$DIR"

            echo "Pack round $i done"
            sleep $((RANDOM % 4 + 1))
          done
